<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Personal Details Form</title>
  </head>

  <body>
    <h1>Personal Details Form</h1>

    <form>

      <fieldset>
        <legend>Basic Information</legend>

        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email ID:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="contact">Contact Number:</label><br>
        <input type="password" id="contact" name="contact"><br><br>

      </fieldset>

      <br>

      <fieldset>
        <legend>Gender</legend>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label><br>

        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label><br>

      </fieldset>

      <br>

      <fieldset>
        <legend>Favourite City</legend>

        <input type="checkbox" id="delhi" name="city" value="New Delhi">
        <label for="delhi">New Delhi</label><br>

        <input type="checkbox" id="mumbai" name="city" value="Mumbai">
        <label for="mumbai">Mumbai</label><br>

      </fieldset>

      <br>

      <input type="submit" value="Submit">

    </form>
  </body>
</html>
